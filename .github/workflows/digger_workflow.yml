name: Digger (Terraform on GitHub Actions)

on:
  pull_request:
    paths:
      - terraform/environments/**
    types: [opened, synchronize]

  # Run Digger on PR comment (e.g., "digger plan" or "digger apply")
  issue_comment:
    types: [created]

permissions:
  contents: write # required to merge PRs
  actions: write # required for plan persistence
  id-token: write # required for workload-identity-federation
  pull-requests: write # required to post PR comments
  issues: read # required to check if PR number is an issue or not
  statuses: write # required to validate combined PR status

jobs:
  check-env:
    name: Check Environment
    runs-on: ubuntu-latest
    outputs:
      competition01: ${{ steps.filter.outputs.competition01 }}
      competition02: ${{ steps.filter.outputs.competition02 }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            competition01:
              - "terraform/environments/competition01/**"
              - "terraform/modules/**"
            competition02:
              - "terraform/environments/competition02/**"
              - "terraform/modules/**"

  digger-competition01:
    needs: check-env
    if: ${{ needs.check-env.outputs.competition01 == 'true' }}
    # Use the secrets defined in the Environment(competition01)
    environment: competition01
    name: Digger(competition01)
    runs-on: ubuntu-latest

    concurrency:
      group: digger-competition01-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read TF version
        id: tfver
        run: |
          echo "TF_VERSION=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"

      - name: Inject tfvars
        run: |
          echo "${{ secrets.COMPETITION01_TFVARS_SECRET }}" \
            > terraform/environments/competition01/secrets.auto.tfvars

      - name: Google Auth (Workflow identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DIGGER_SA }}
          token_format: access_token
          create_credentials_file: true
          export_environment_variables: true

      - name: Run Digger
        uses: diggerhq/digger@v0.6.100
        with:
          no-backend: true
          disable-locking: true
          terraform-version: ${{ steps.tfver.outputs.TF_VERSION }}
          google-lock-bucket: "gcp"
          upload-plan-destination-gcp-bucket: ${{ secrets.GCP_DIGGER_BUCKET }}
          setup-google-cloud: false
          setup-terraform: true
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
